name: Build and Deploy to Server

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_name_lower: ${{ steps.lowercase.outputs.image_name_lower }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Convert repository name to lowercase
        id: lowercase
        run: |
          echo "image_name_lower=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name_lower }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'

    steps:
      - name: Extract image tag
        id: vars
        run: |
          # Используем SHA коммита как тег образа
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          # Преобразуем имя репозитория в нижний регистр
          echo "image_name_lower=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Create deployment script
        run: |
          cat > deploy.sh << 'EOF'
          #!/bin/bash
          set -e

          IMAGE_NAME="$1"
          CONTAINER_NAME="$2"

          echo "Logging into Container Registry..."
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

          echo "Pulling Docker image..."
          docker pull "$IMAGE_NAME"

          echo "Stopping existing container if exists..."
          docker stop "$CONTAINER_NAME" 2>/dev/null || true
          docker rm "$CONTAINER_NAME" 2>/dev/null || true

          echo "Starting new container..."
          docker run -d --name "$CONTAINER_NAME" \
            --restart unless-stopped \
            "$IMAGE_NAME"

          echo "Deployment completed successfully!"
          EOF
          chmod +x deploy.sh

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Логинимся в ghcr.io
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Определяем тег образа (имя в нижнем регистре)
            IMAGE_TAG="${{ github.sha }}"
            IMAGE="${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name_lower }}:$IMAGE_TAG"

            # Останавливаем старый контейнер (если есть)
            docker stop my-app 2>/dev/null || true
            docker rm my-app 2>/dev/null || true

            # Стягиваем и запускаем новый образ
            docker pull "$IMAGE"
            docker run -d --name my-app \
              --restart unless-stopped \
              -p 8000:8000 \
              "$IMAGE"

            echo "Deployment completed!"
